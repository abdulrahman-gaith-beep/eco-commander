[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for selective test execution
markers =
    security: Security and hardening tests
    slow: Tests that take >2 seconds
    integration: Cross-subsystem integration tests
    poller: Tests for the poller subsystem
    scheduler: Tests for the scheduler subsystem

# Short traceback format for cleaner output
addopts = --tb=short -q

# Minimum Python version
minversion = 3.10
