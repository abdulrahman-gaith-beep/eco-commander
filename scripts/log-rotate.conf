# newsyslog(5) config for eco-commander logs.
#
# Installed at: /etc/newsyslog.d/eco-commander.conf  (requires sudo)
# OR per-user at: ~/Library/Logs/newsyslog/eco-commander.conf  (no sudo, but
# only honored if a user-level newsyslog runs — most setups use /etc).
#
# Template variables:
#   __ECO_HOME__  — rendered by install-log-rotation.sh to the actual ~/.eco path
#
# Format:
#   logfilename                              [owner:group] mode count size when flags
#   - size in KB; rotates when log exceeds size
#   - count: how many compressed archives to keep
#   - flags: J = compress with bzip2; Z = compress with gzip
#
# Tuning rationale:
#   - mode 600: owner-only; logs can include local paths and runtime metadata.
#   - count 5: keep 5 rotations (≈5 weeks of daily peaks).
#   - size 1024: rotate at 1 MB. Small enough to keep `tail` snappy.
#   - when '*': rotate solely on size, ignore time.
#   - flag Z: gzip; faster than bzip2, smaller than uncompressed.

# Poller logs
__ECO_HOME__/logs/usage-poller.out.log       __USER__:staff 600 5 1024 * Z
__ECO_HOME__/logs/usage-poller.err.log       __USER__:staff 600 5 1024 * Z

# Snapshot logs
__ECO_HOME__/logs/usage-snapshot.err.log     __USER__:staff 600 5 1024 * Z

# SwiftBar autostart logs
__ECO_HOME__/logs/swiftbar-autostart.out.log __USER__:staff 600 5  512 * Z
__ECO_HOME__/logs/swiftbar-autostart.err.log __USER__:staff 600 5  512 * Z

# Scheduler logs (previously missing — would grow unbounded)
__ECO_HOME__/logs/scheduler.out.log          __USER__:staff 600 5 1024 * Z
__ECO_HOME__/logs/scheduler.err.log          __USER__:staff 600 5 1024 * Z
