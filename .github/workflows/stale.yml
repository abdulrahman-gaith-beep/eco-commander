name: Stale

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e # v9.1.0
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in
            14 days unless there is new activity.
          stale-pr-message: >
            This PR has been inactive for 60 days. It will be closed in
            14 days unless there is new activity.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "security,discussion"
          exempt-pr-labels: "security"
