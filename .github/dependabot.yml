version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area:github
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Asia/Riyadh
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - area:python
    commit-message:
      prefix: deps
      include: scope
