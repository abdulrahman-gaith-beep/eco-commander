name: ✨ Feature request
description: Propose new functionality, enhancements, or recipes for eco-commander.
title: "feat: <short description>"
labels: [enhancement]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!
        > [!NOTE]
        > Providing as much context as possible helps us prioritize and design the right solution.

  - type: checkboxes
    id: pre-check
    attributes:
      label: Pre-flight Checklist
      description: Please ensure you have completed the following before submitting.
      options:
        - label: I have searched the existing issues to ensure this feature has not already been requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: The Problem
      description: What is the user-visible pain or limitation? Is your feature request related to a specific problem?
      placeholder: "e.g., I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or new behavior you'd like to see.
      placeholder: "e.g., I would like the CLI to have a `--watch` flag that..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: component
    attributes:
      label: Target Component
      description: Which area of eco-commander does this primarily affect?
      options:
        - CLI (eco)
        - Recipes
        - SwiftBar widget
        - Poller
        - Scheduler
        - Scripts / install
        - Docs
        - Core Architecture
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request here.
